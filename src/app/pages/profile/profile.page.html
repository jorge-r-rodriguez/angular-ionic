<ion-header [translucent]="true">
  <ion-toolbar color="primary" class="app-toolbar">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/products" text="Volver"></ion-back-button>
    </ion-buttons>
    <div class="toolbar-logo-center">
      <img src="assets/img/logo-sdi.png" alt="SDI App" class="toolbar-logo" />
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div class="profile-container">
    <div class="avatar-container">
      <div class="avatar">
        <ion-icon name="person"></ion-icon>
      </div>
      <h2>{{ user.name }}</h2>
    </div>

    <ion-card class="info-card">
      <ion-card-header>
        <ion-card-title>Datos de usuario</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <ion-item lines="full">
          <ion-icon name="mail-outline" slot="start" color="primary"></ion-icon>
          <ion-label>
            <h3>Email</h3>
            <p>{{ user.email }}</p>
          </ion-label>
        </ion-item>

        <ion-item lines="none">
          <ion-icon name="business-outline" slot="start" color="primary"></ion-icon>
          <ion-label>
            <h3>Empresa</h3>
            <p>{{ user.company }}</p>
          </ion-label>
        </ion-item>
      </ion-card-content>
    </ion-card>

    <ion-button expand="block" color="danger" class="logout-btn" (click)="logout()">
      Cerrar sesion
    </ion-button>
  </div>
</ion-content>
